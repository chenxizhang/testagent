name: Daily Hot News

on:
  schedule:
    # Run daily at 00:00 UTC (08:00 Beijing time)
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull latest changes
        run: git pull origin ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch news and push via Copilot
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)

          copilot -p "You are running in a CI environment. Complete the following tasks:

          1. Create the directory 'news' if it does not exist.
          2. Search for today's world hot news (date: ${TODAY}). Write a Markdown file at 'news/hot-news-${TODAY}.md' with:
             - Title: '# World Hot News - ${TODAY}'
             - Top 10 most important global news headlines, each as a numbered item with a bold headline and a brief summary paragraph.
             - Cover diverse categories: politics, technology, economy, science, and society.
          3. After writing the file, run 'git add news/' and commit with message 'docs: add world hot news for ${TODAY}'.
          4. Push the commit to origin. If the push fails due to remote changes (e.g., another agent pushed first), automatically resolve it by running 'git pull --rebase origin main' and then retry the push. Repeat up to 3 times if needed.
          5. If there are merge conflicts during rebase, resolve them by keeping both changes, then continue the rebase and push."
