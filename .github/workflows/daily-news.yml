name: Daily Hot News

on:
  schedule:
    # Run daily at 00:00 UTC (08:00 Beijing time)
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull latest changes
        run: git pull origin ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Fetch world hot news
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          NEWS_FILE="news/hot-news-${TODAY}.md"
          mkdir -p news

          copilot -p "Search for today's world hot news (date: ${TODAY}). \
            List the top 10 most important global news headlines with a brief summary for each. \
            Cover diverse categories including politics, technology, economy, science, and society. \
            Format the output as a Markdown document with a title '# World Hot News - ${TODAY}' \
            and each news item as a numbered list with a bold headline followed by a short summary paragraph." \
            > "$NEWS_FILE"

          echo "News saved to $NEWS_FILE"
          cat "$NEWS_FILE"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: add world hot news for $(date -u +%Y-%m-%d)"
          branch: daily-news-update
          delete-branch: true
          title: "docs: add world hot news for $(date -u +%Y-%m-%d)"
          body: "Automated daily world hot news update generated by Copilot CLI."
          add-paths: news/
