name: Auto-ready agent PRs

on:
  pull_request_target:
    types: [opened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-ready:
    # Only run for PRs created by coding agents
    if: >-
      github.event.pull_request.user.login == 'Copilot' ||
      github.event.pull_request.user.login == 'Claude' ||
      github.event.pull_request.user.login == 'Codex'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for agent to finish writing code
        run: sleep 60

      - name: Mark ready for review (if draft)
        if: github.event.pull_request.draft == true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api graphql -f query='
            mutation {
              markPullRequestReadyForReview(input: {
                pullRequestId: "${{ github.event.pull_request.node_id }}"
              }) {
                pullRequest { isDraft }
              }
            }'

      - name: Enable auto-merge (squash, requires CI to pass)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --auto --squash

      - name: Add welcome comment for agent PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "🤖 **Agent PR detected** from @${PR_AUTHOR}.

- Auto-merge has been enabled (will merge when all required checks pass)
- Copilot code review will run automatically
- Architect review (@claude) will be requested for \`mgc/\` changes

*Automated by the mgc project PM system.*"
