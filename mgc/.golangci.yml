run:
  timeout: 5m
  go: '1.22'

linters:
  enable:
    - gofmt
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - typecheck
  disable:
    - exhaustive
    - wrapcheck
    - exhaustruct

linters-settings:
  errcheck:
    # Don't check error on defer Close() calls
    check-type-assertions: false
  staticcheck:
    checks: ["all", "-SA1019"]

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
